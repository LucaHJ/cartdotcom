    <script src="/refresh-button.js?v=20260526-refresh"></script>
    <script>
        const pageFilter = document.getElementById("pageFilter");
        const searchToggle = document.getElementById("searchToggle");
        const vaultSearch = document.getElementById("vaultSearch");
        const vaultTree = document.getElementById("vaultTree");
        const pathInput = document.getElementById("pathInput");
        const contentPreview = document.getElementById("contentPreview");
        const currentPath = document.getElementById("currentPath");
        const saveStatus = document.getElementById("saveStatus");
        const pageCount = document.getElementById("pageCount");
        const edgeCount = document.getElementById("edgeCount");
        const graphStatus = document.getElementById("graphStatus");
        const graphTitle = document.getElementById("graphTitle");
        const graphSvg = document.getElementById("graphSvg");
        const graphEmpty = document.getElementById("graphEmpty");
        const editorDrawer = document.getElementById("editorDrawer");
        const brainWorkspace = document.getElementById("brainWorkspace");
        const zoomOutGraph = document.getElementById("zoomOutGraph");
        const zoomInGraph = document.getElementById("zoomInGraph");
        const collapseTree = document.getElementById("collapseTree");
        const openTree = document.getElementById("openTree");
        const svgNamespace = "http://www.w3.org/2000/svg";

        const cachePrefix = "cartdotcom:second-brain:";
        const pagesCacheKey = `${cachePrefix}pages:v3`;
        const contentCachePrefix = `${cachePrefix}content:v2:`;
        const pagesCacheTtl = 10 * 60 * 1000;
        const contentCacheTtl = 30 * 60 * 1000;
        const minGraphZoom = 0.06;
        const rootFolderLabelByName = new Map();

        let pages = [];
        let pageContentByPath = new Map();
        let graphData = { nodes: [], edges: [] };
        let selectedPath = "";
        let focusedNodeId = "";
        let vaultTreeOpen = true;
        let graphViewport = null;
        let graphPan = { x: 0, y: 0 };
        let graphZoom = 1;
        let graphHasUserTransform = false;
        let graphLayoutSize = { width: 0, height: 0 };
        let graphDrag = null;
        let graphSuppressClick = false;

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function unescapeHtml(value) {
            return String(value || "")
                .replace(/&amp;/g, "&")
                .replace(/&lt;/g, "<")
                .replace(/&gt;/g, ">")
                .replace(/&quot;/g, '"')
                .replace(/&#039;/g, "'");
        }

        function safeHref(value) {
            const href = String(value || "").trim();
            if (/^(https?:|mailto:|\/|#)/i.test(href)) return href;
            return "#";
        }

        function setSearchOpen(open) {
            vaultSearch.classList.toggle("is-open", open);
            searchToggle.setAttribute("aria-expanded", open ? "true" : "false");
            if (open) pageFilter.focus();
        }

        function syncSearchState() {
            vaultSearch.classList.toggle("has-value", Boolean(pageFilter.value.trim()));
        }

        async function api(path, options = {}) {
            const response = await fetch(path, {
                ...options,
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });
            const contentType = response.headers.get("content-type") || "";
            const redirectedToAccess = response.redirected && response.url.includes("cloudflareaccess.com");
            const payload = contentType.includes("application/json") ? await response.json().catch(() => ({})) : {};
            if (redirectedToAccess || (!contentType.includes("application/json") && response.url.includes("cloudflareaccess.com"))) {
                throw new Error("Backend login session missing. Sign in again, then try again.");
            }
            if (!response.ok) throw new Error(payload.error || "Request failed.");
            return payload;
        }

        function readLocalValue(key) {
            try {
                return window.localStorage?.getItem(key) || null;
            } catch {
                return null;
            }
        }

        function writeLocalValue(key, value) {
            try {
                window.localStorage?.setItem(key, value);
            } catch {
                /* Preference persistence is optional. */
            }
        }

        function readCache(key, ttl = Infinity) {
            try {
                const cached = JSON.parse(readLocalValue(key) || "null");
                if (!cached || typeof cached !== "object") return null;
                if (Date.now() - Number(cached.cachedAt || 0) > ttl) return null;
                return cached.value;
            } catch {
                return null;
            }
        }

        function writeCache(key, value) {
            try {
                writeLocalValue(key, JSON.stringify({ cachedAt: Date.now(), value }));
            } catch {
                /* Local storage can be full or disabled; network reads still work. */
            }
        }

        function pageCacheKey(path) {
            return `${contentCachePrefix}${encodeURIComponent(path)}`;
        }

        function fileTypeForPath(path) {
            if (/\.md$/i.test(path)) return "markdown";
            if (/\.(png|jpe?g|gif|webp|svg)$/i.test(path)) return "image";
            return "file";
        }

        function isMarkdownFile(file) {
            return (file?.type || fileTypeForPath(file?.path || file)) === "markdown";
        }

        function isImageFile(file) {
            return (file?.type || fileTypeForPath(file?.path || file)) === "image";
        }

        function fileRecordForPath(path) {
            return pages.find((page) => page.path === path) || { path, type: fileTypeForPath(path) };
        }

        function rootFolderBaseLabel(name) {
            return String(name || "")
                .replace(/^\d{2}-/, "")
                .replace(/-/g, " ");
        }

        function rootFolderSortValue(name) {
            const match = String(name || "").match(/^(\d{2})-/u);
            return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
        }

        function refreshRootFolderLabels() {
            rootFolderLabelByName.clear();
            const roots = Array.from(new Set(
                pages
                    .map((page) => String(page.path || "").split("/").filter(Boolean)[0])
                    .filter((root) => /^\d{2}-/u.test(root))
            )).sort((left, right) => {
                const numeric = rootFolderSortValue(left) - rootFolderSortValue(right);
                return numeric || left.localeCompare(right);
            });

            roots.forEach((root, index) => {
                const number = String(index * 10).padStart(2, "0");
                rootFolderLabelByName.set(root, `${number} ${rootFolderBaseLabel(root)}`);
            });
        }

        function displayFolderLabel(name, path) {
            if (!String(path || "").includes("/")) {
                return (rootFolderLabelByName.get(String(name || "")) || String(name || ""))
                    .replace(/^(\d{2})-(.+)$/u, (_, number, label) => `${number} ${label.replace(/-/g, " ")}`)
                    .replace(/^(raw|wiki)$/u, (_, label) => label.charAt(0).toUpperCase() + label.slice(1));
            }
            return String(name || "").replace(/-/g, " ");
        }

        function displayVaultPath(path) {
            const segments = String(path || "").split("/").filter(Boolean);
            if (!segments.length) return "";
            const [root, ...rest] = segments;
            return [displayFolderLabel(root, root), ...rest].join("/");
        }

        function displayFileLabel(name, type = "markdown") {
            const label = String(name || "");
            return type === "markdown" ? label.replace(/\.md$/i, "") : label;
        }

        function showTreeSkeleton() {
            vaultTree.innerHTML = Array.from({ length: 18 }, (_, index) => (
                `<span class="skeleton-line tree-skeleton line-${(index % 4) + 1}"></span>`
            )).join("");
        }

        function showGraphSkeleton() {
            graphViewport = null;
            graphHasUserTransform = false;
            graphSvg.replaceChildren();
            graphEmpty.hidden = false;
            graphEmpty.innerHTML = `
                <span class="graph-skeleton">
                    <span></span><span></span><span></span><span></span><span></span>
                </span>
            `;
        }

        function showPreviewSkeleton(path) {
            selectedPath = path;
            focusedNodeId = fileNodeId(path);
            const visiblePath = displayVaultPath(path);
            pathInput.disabled = false;
            pathInput.value = visiblePath;
            currentPath.textContent = visiblePath;
            contentPreview.innerHTML = Array.from({ length: 14 }, (_, index) => (
                `<span class="skeleton-line preview-skeleton line-${(index % 5) + 1}"></span>`
            )).join("");
            openPreview();
            renderTree();
            renderGraph();
        }

        async function mapLimit(items, limit, worker) {
            const results = new Array(items.length);
            let index = 0;
            const runners = Array.from({ length: Math.min(limit, items.length) }, async () => {
                while (index < items.length) {
                    const current = index;
                    index += 1;
                    results[current] = await worker(items[current], current);
                }
            });
            await Promise.all(runners);
            return results;
        }

        function createTree(files) {
            const root = { type: "folder", name: "Vault", path: "", children: [], childMap: new Map() };

            function ensureChild(parent, type, name, path) {
                const key = `${type}:${name}`;
                if (!parent.childMap.has(key)) {
                    const child = { type, name, path, children: [], childMap: new Map() };
                    parent.childMap.set(key, child);
                    parent.children.push(child);
                }
                return parent.childMap.get(key);
            }

            files.forEach((page) => {
                const segments = page.path.split("/").filter(Boolean);
                let parent = root;
                let currentPath = "";
                segments.forEach((segment, index) => {
                    currentPath = currentPath ? `${currentPath}/${segment}` : segment;
                    const isFile = index === segments.length - 1;
                    parent = ensureChild(parent, isFile ? "file" : "folder", segment, currentPath);
                    if (isFile) {
                        parent.fileType = page.type || fileTypeForPath(page.path);
                        parent.contentType = page.content_type || "";
                    }
                });
            });

            return root;
        }

        function sortTreeChildren(children) {
            return children.slice().sort((left, right) => {
                if (left.type !== right.type) return left.type === "folder" ? -1 : 1;
                return left.name.localeCompare(right.name);
            });
        }

        function folderNodeId(path) {
            return `folder:${path || ""}`;
        }

        function fileNodeId(path) {
            return `file:${path}`;
        }

        function nodeIdForTreeNode(node) {
            return node.type === "file" ? fileNodeId(node.path) : folderNodeId(node.path);
        }

        function isDescendantPath(path, parentPath) {
            if (!parentPath) return true;
            return path === parentPath || path.startsWith(`${parentPath}/`);
        }

        function pathAncestorIds(path) {
            const ids = [folderNodeId("")];
            const segments = String(path || "").split("/").filter(Boolean);
            let current = "";
            segments.slice(0, -1).forEach((segment) => {
                current = current ? `${current}/${segment}` : segment;
                ids.push(folderNodeId(current));
            });
            return ids;
        }

        function getFocusedNode() {
            if (!focusedNodeId) return null;
            return graphData.nodes.find((node) => node.id === focusedNodeId) || null;
        }

        function getFocusedNodeIds() {
            const focusedNode = getFocusedNode();
            if (!focusedNode) return new Set();
            if (focusedNode.type === "root") return new Set(graphData.nodes.map((node) => node.id));

            const related = new Set([focusedNode.id, ...pathAncestorIds(focusedNode.path)]);

            if (focusedNode.type === "folder") {
                graphData.nodes.forEach((node) => {
                    if (node.path && isDescendantPath(node.path, focusedNode.path)) related.add(node.id);
                });
                return related;
            }

            if (focusedNode.type === "file") {
                graphData.edges.forEach((edge) => {
                    if (edge.source === focusedNode.id) related.add(edge.target);
                    if (edge.target === focusedNode.id) related.add(edge.source);
                });
                Array.from(related).forEach((nodeId) => {
                    const node = graphData.nodes.find((item) => item.id === nodeId);
                    if (node?.path) pathAncestorIds(node.path).forEach((id) => related.add(id));
                });
            }

            return related;
        }

        function isTreeNodeFocused(node) {
            if (!focusedNodeId) return false;
            const focusedNode = getFocusedNode();
            if (!focusedNode) return false;
            if (focusedNode.type === "root") return true;

            if (focusedNode.type === "folder") {
                if (node.type === "folder") {
                    return isDescendantPath(node.path, focusedNode.path) || isDescendantPath(focusedNode.path, node.path);
                }
                return isDescendantPath(node.path, focusedNode.path);
            }

            return getFocusedNodeIds().has(nodeIdForTreeNode(node));
        }

        function openPreview() {
            editorDrawer.hidden = false;
            editorDrawer.classList.add("has-page");
            brainWorkspace.classList.add("has-open-page");
        }

        function closePreview() {
            selectedPath = "";
            pathInput.value = "";
            contentPreview.innerHTML = "";
            pathInput.disabled = true;
            currentPath.textContent = "Select a page";
            saveStatus.textContent = "";
            editorDrawer.classList.remove("has-page");
            editorDrawer.hidden = true;
            brainWorkspace.classList.remove("has-open-page");
        }

        function clearFocusAndPreview() {
            focusedNodeId = "";
            closePreview();
            renderTree();
            renderGraph();
        }

        function focusFolder(path) {
            focusedNodeId = folderNodeId(path);
            closePreview();
            graphStatus.textContent = path ? "Focused" : "Ready";
            renderTree();
            renderGraph();
        }

        function setVaultTreeOpen(open) {
            vaultTreeOpen = open;
            vaultTree.querySelectorAll("details.tree-folder").forEach((details) => {
                details.open = open;
            });
        }

        function renderTreeNode(node, container) {
            if (node.type === "folder") {
                const details = document.createElement("details");
                details.className = `tree-folder${focusedNodeId && !isTreeNodeFocused(node) ? " is-dimmed" : ""}${nodeIdForTreeNode(node) === focusedNodeId ? " is-focused" : ""}`;
                details.open = vaultTreeOpen;

                const summary = document.createElement("summary");
                summary.textContent = displayFolderLabel(node.name, node.path);
                summary.title = node.path || "Vault";
                summary.addEventListener("click", () => focusFolder(node.path));
                details.appendChild(summary);

                const children = document.createElement("div");
                children.className = "tree-children";
                sortTreeChildren(node.children).forEach((child) => renderTreeNode(child, children));
                details.appendChild(children);
                container.appendChild(details);
                return;
            }

            const button = document.createElement("button");
            button.type = "button";
            button.className = "tree-file" +
                (node.path === selectedPath ? " is-active" : "") +
                (focusedNodeId && !isTreeNodeFocused(node) ? " is-dimmed" : "") +
                (nodeIdForTreeNode(node) === focusedNodeId ? " is-focused" : "");
            button.textContent = displayFileLabel(node.name, node.fileType);
            button.title = node.path;
            button.addEventListener("click", () => loadPage(node.path));
            container.appendChild(button);
        }

        function renderTree() {
            const filter = pageFilter.value.trim().toLowerCase();
            const filtered = pages.filter((page) => !filter || page.path.toLowerCase().includes(filter));
            vaultTree.innerHTML = "";

            if (!filtered.length) {
                vaultTree.innerHTML = `<p class="empty">${filter ? "No matching files." : "No cloud files found."}</p>`;
                return;
            }

            const tree = createTree(filtered);
            sortTreeChildren(tree.children).forEach((child) => renderTreeNode(child, vaultTree));
        }

        function normalizeLinkKey(value) {
            return String(value || "")
                .trim()
                .replace(/\\/g, "/")
                .replace(/^Vault\//i, "")
                .replace(/^\.\//, "")
                .replace(/^\/+/, "")
                .replace(/\.md$/i, "")
                .toLowerCase();
        }

        function parseWikiReference(value) {
            const [targetWithHeading, alias] = String(value || "").split("|");
            const [target, heading] = targetWithHeading.split("#");
            const cleanTarget = target.trim();
            const fallbackLabel = cleanTarget.split("/").filter(Boolean).pop() || cleanTarget;
            return {
                target: cleanTarget,
                heading: heading ? heading.trim() : "",
                label: (alias || fallbackLabel).trim().replace(/\.md$/i, "")
            };
        }

        function normalizePathSegments(value) {
            const segments = [];
            String(value || "").replace(/\\/g, "/").split("/").forEach((segment) => {
                if (!segment || segment === ".") return;
                if (segment === "..") {
                    segments.pop();
                    return;
                }
                segments.push(segment);
            });
            return segments.join("/");
        }

        function candidateLinkKeys(target, sourcePath = "") {
            const cleanTarget = parseWikiReference(target).target;
            const keys = new Set();
            const add = (value) => {
                const key = normalizeLinkKey(value);
                if (key) keys.add(key);
            };

            add(cleanTarget);

            const sourceParts = String(sourcePath || "").replace(/\\/g, "/").split("/");
            sourceParts.pop();
            const sourceDir = sourceParts.join("/");
            if (sourceDir && (cleanTarget.startsWith(".") || cleanTarget.includes("../"))) {
                add(normalizePathSegments(`${sourceDir}/${cleanTarget}`));
            }

            return Array.from(keys);
        }

        function createWikiResolver() {
            const byPath = new Map();
            const byName = new Map();
            const duplicateNames = new Set();

            pages.forEach((page) => {
                if (!isMarkdownFile(page)) return;
                const pathKey = normalizeLinkKey(page.path);
                const nameKey = normalizeLinkKey(page.path.split("/").pop());
                byPath.set(pathKey, page.path);
                if (byName.has(nameKey) && byName.get(nameKey) !== page.path) {
                    duplicateNames.add(nameKey);
                } else {
                    byName.set(nameKey, page.path);
                }
            });

            duplicateNames.forEach((key) => byName.delete(key));

            return (target, sourcePath = "") => {
                const keys = candidateLinkKeys(target, sourcePath);
                for (const key of keys) {
                    if (byPath.has(key)) return byPath.get(key);
                    if (byName.has(key)) return byName.get(key);
                }
                return null;
            };
        }

        function extractWikiTargets(content) {
            const targets = [];
            const regex = /\[\[([^\]|#]+)(?:#[^\]|]+)?(?:\|[^\]]+)?\]\]/g;
            let match;
            while ((match = regex.exec(content)) !== null) {
                targets.push(match[1].trim());
            }
            return targets;
        }

        function splitMarkdownRow(line) {
            const cells = [];
            let current = "";
            let inWikiLink = false;
            const text = String(line || "").trim().replace(/^\|/, "").replace(/\|$/, "");

            for (let index = 0; index < text.length; index += 1) {
                const pair = text.slice(index, index + 2);
                if (pair === "[[") {
                    inWikiLink = true;
                    current += pair;
                    index += 1;
                    continue;
                }
                if (pair === "]]") {
                    inWikiLink = false;
                    current += pair;
                    index += 1;
                    continue;
                }
                if (text[index] === "|" && !inWikiLink) {
                    cells.push(current.trim());
                    current = "";
                    continue;
                }
                current += text[index];
            }

            cells.push(current.trim());
            return cells;
        }

        function isTableSeparator(line) {
            return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
        }

        function renderInlineMarkdown(value, sourcePath = selectedPath) {
            const resolver = createWikiResolver();
            const codeTokens = [];
            let html = escapeHtml(value).replace(/`([^`]+)`/g, (_, code) => {
                const token = `@@CODE${codeTokens.length}@@`;
                codeTokens.push(`<code>${code}</code>`);
                return token;
            });

            html = html.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_, alt, url) => {
                return `<span class="markdown-image">${escapeHtml(unescapeHtml(alt) || unescapeHtml(url))}</span>`;
            });

            html = html.replace(/\[\[([^\]]+)\]\]/g, (_, rawReference) => {
                const reference = parseWikiReference(unescapeHtml(rawReference));
                const resolved = resolver(reference.target, sourcePath);
                const label = escapeHtml(reference.label || reference.target);
                if (!resolved) return `<span class="wiki-link unresolved">${label}</span>`;
                return `<a class="wiki-link" href="#${encodeURIComponent(resolved)}" data-wiki-path="${escapeHtml(resolved)}">${label}</a>`;
            });

            html = html.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_, label, url) => {
                return `<a href="${escapeHtml(safeHref(unescapeHtml(url)))}" target="_blank" rel="noopener noreferrer">${label}</a>`;
            });

            html = html
                .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                .replace(/__([^_]+)__/g, "<strong>$1</strong>")
                .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
                .replace(/(^|[^_])_([^_]+)_/g, "$1<em>$2</em>");

            codeTokens.forEach((code, index) => {
                html = html.replace(`@@CODE${index}@@`, code);
            });

            return html;
        }

        function renderTable(lines, sourcePath) {
            if (lines.length < 2) return "";
            const header = splitMarkdownRow(lines[0]);
            const rows = lines.slice(2).map(splitMarkdownRow);
            return `
                <table>
                    <thead><tr>${header.map((cell) => `<th>${renderInlineMarkdown(cell, sourcePath)}</th>`).join("")}</tr></thead>
                    <tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell, sourcePath)}</td>`).join("")}</tr>`).join("")}</tbody>
                </table>
            `;
        }

        function renderMarkdown(content, sourcePath = selectedPath) {
            const lines = String(content || "").replace(/\r\n?/g, "\n").split("\n");
            const output = [];
            let paragraph = [];
            let list = null;
            let codeBlock = null;
            let quote = [];

            const flushParagraph = () => {
                if (!paragraph.length) return;
                output.push(`<p>${renderInlineMarkdown(paragraph.join(" "), sourcePath)}</p>`);
                paragraph = [];
            };

            const flushList = () => {
                if (!list) return;
                const tag = list.ordered ? "ol" : "ul";
                output.push(`<${tag} class="markdown-list">${list.items.map((item) => {
                    const checkbox = item.checked === null ? "" : `<span class="task-marker">${item.checked ? "✓" : ""}</span>`;
                    return `<li class="level-${item.level}${item.checked !== null ? " task-item" : ""}">${checkbox}<span>${renderInlineMarkdown(item.text, sourcePath)}</span></li>`;
                }).join("")}</${tag}>`);
                list = null;
            };

            const flushQuote = () => {
                if (!quote.length) return;
                output.push(`<blockquote>${quote.map((line) => `<p>${renderInlineMarkdown(line, sourcePath)}</p>`).join("")}</blockquote>`);
                quote = [];
            };

            const flushBlocks = () => {
                flushParagraph();
                flushList();
                flushQuote();
            };

            for (let index = 0; index < lines.length; index += 1) {
                const line = lines[index];
                const trimmed = line.trim();

                if (codeBlock) {
                    if (/^```/.test(trimmed)) {
                        output.push(`<pre><code>${escapeHtml(codeBlock.join("\n"))}</code></pre>`);
                        codeBlock = null;
                    } else {
                        codeBlock.push(line);
                    }
                    continue;
                }

                if (/^```/.test(trimmed)) {
                    flushBlocks();
                    codeBlock = [];
                    continue;
                }

                if (!trimmed) {
                    flushBlocks();
                    continue;
                }

                if (line.includes("|") && isTableSeparator(lines[index + 1] || "")) {
                    flushBlocks();
                    const tableLines = [line, lines[index + 1]];
                    index += 2;
                    while (index < lines.length && lines[index].includes("|") && lines[index].trim()) {
                        tableLines.push(lines[index]);
                        index += 1;
                    }
                    index -= 1;
                    output.push(renderTable(tableLines, sourcePath));
                    continue;
                }

                const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
                if (heading) {
                    flushBlocks();
                    const level = Math.min(6, heading[1].length);
                    output.push(`<h${level}>${renderInlineMarkdown(heading[2], sourcePath)}</h${level}>`);
                    continue;
                }

                if (/^[-*_]{3,}$/.test(trimmed)) {
                    flushBlocks();
                    output.push("<hr>");
                    continue;
                }

                const quoteMatch = trimmed.match(/^>\s?(.*)$/);
                if (quoteMatch) {
                    flushParagraph();
                    flushList();
                    quote.push(quoteMatch[1]);
                    continue;
                }

                const unordered = line.match(/^(\s*)[-*+]\s+(.+)$/);
                const ordered = line.match(/^(\s*)\d+[.)]\s+(.+)$/);
                const listMatch = unordered || ordered;
                if (listMatch) {
                    flushParagraph();
                    flushQuote();
                    const isOrdered = Boolean(ordered);
                    if (!list || list.ordered !== isOrdered) flushList();
                    if (!list) list = { ordered: isOrdered, items: [] };
                    let text = listMatch[2].trim();
                    let checked = null;
                    const checkbox = text.match(/^\[([ xX])\]\s+(.+)$/);
                    if (checkbox) {
                        checked = checkbox[1].toLowerCase() === "x";
                        text = checkbox[2];
                    }
                    list.items.push({
                        level: Math.min(3, Math.floor(listMatch[1].replace(/\t/g, "    ").length / 2)),
                        checked,
                        text
                    });
                    continue;
                }

                paragraph.push(trimmed);
            }

            if (codeBlock) output.push(`<pre><code>${escapeHtml(codeBlock.join("\n"))}</code></pre>`);
            flushBlocks();
            return output.join("") || `<p class="empty">Empty page.</p>`;
        }

        function applyGraphPan() {
            if (!graphViewport) return;
            graphViewport.setAttribute("transform", `matrix(${graphZoom} 0 0 ${graphZoom} ${graphPan.x} ${graphPan.y})`);
            updateGraphNodeScales();
        }

        function setGraphZoom(nextZoom, originX = null, originY = null) {
            const previousZoom = graphZoom;
            const boundedZoom = Math.max(minGraphZoom, Math.min(8, nextZoom));
            if (Math.abs(boundedZoom - previousZoom) < 0.001) return;

            const width = Math.max(360, Math.round(graphSvg.clientWidth || graphSvg.parentElement.clientWidth || 720));
            const height = Math.max(460, Math.round(graphSvg.clientHeight || graphSvg.parentElement.clientHeight || 620));
            const focusX = originX ?? width / 2;
            const focusY = originY ?? height / 2;
            graphPan = {
                x: focusX - ((focusX - graphPan.x) * boundedZoom) / previousZoom,
                y: focusY - ((focusY - graphPan.y) * boundedZoom) / previousZoom
            };
            graphZoom = boundedZoom;
            graphHasUserTransform = true;
            applyGraphPan();
        }

        function upsertNode(nodeMap, node) {
            if (!nodeMap.has(node.id)) nodeMap.set(node.id, node);
            return nodeMap.get(node.id);
        }

        function addEdge(edges, edgeKeys, source, target, type) {
            if (!source || !target || source === target) return;
            const key = `${source}->${target}:${type}`;
            if (edgeKeys.has(key)) return;
            edgeKeys.add(key);
            edges.push({ source, target, type });
        }

        function buildGraph() {
            refreshRootFolderLabels();
            const nodeMap = new Map();
            const edges = [];
            const edgeKeys = new Set();
            const rootId = folderNodeId("");

            upsertNode(nodeMap, { id: rootId, label: "Vault", type: "root", path: "" });

            pages.forEach((page) => {
                const segments = page.path.split("/").filter(Boolean);
                let parentId = rootId;
                let folderPath = "";

                segments.forEach((segment, index) => {
                    const isFile = index === segments.length - 1;
                    if (isFile) {
                        const fileId = fileNodeId(page.path);
                        upsertNode(nodeMap, { id: fileId, label: displayFileLabel(segment, page.type || fileTypeForPath(page.path)), type: "file", path: page.path });
                        addEdge(edges, edgeKeys, parentId, fileId, "folder");
                        return;
                    }

                    folderPath = folderPath ? `${folderPath}/${segment}` : segment;
                    const folderId = folderNodeId(folderPath);
                    upsertNode(nodeMap, { id: folderId, label: displayFolderLabel(segment, folderPath), type: "folder", path: folderPath });
                    addEdge(edges, edgeKeys, parentId, folderId, "folder");
                    parentId = folderId;
                });

            });

            graphData = { nodes: Array.from(nodeMap.values()), edges };
            pageCount.textContent = `${pages.length} file${pages.length === 1 ? "" : "s"}`;
            edgeCount.textContent = `${edges.length} connection${edges.length === 1 ? "" : "s"}`;
        }

        function buildGraphTree(nodes, edges) {
            const nodeById = new Map(nodes.map((node) => [node.id, node]));
            const children = new Map(nodes.map((node) => [node.id, []]));

            edges.forEach((edge) => {
                if (!nodeById.has(edge.source) || !nodeById.has(edge.target)) return;
                children.get(edge.source).push(edge.target);
            });

            children.forEach((childIds) => {
                childIds.sort((leftId, rightId) => {
                    const left = nodeById.get(leftId);
                    const right = nodeById.get(rightId);
                    if (left.type !== right.type) return left.type === "folder" ? -1 : 1;
                    return left.path.localeCompare(right.path);
                });
            });

            return { nodeById, children, rootId: folderNodeId("") };
        }

        function graphStructureStats(nodes, edges) {
            const { children, rootId } = buildGraphTree(nodes, edges);
            let maxDepth = 0;
            let leafCount = 0;

            function walk(nodeId, depth) {
                maxDepth = Math.max(maxDepth, depth);
                const childIds = children.get(nodeId) || [];
                if (!childIds.length) {
                    leafCount += 1;
                    return;
                }
                childIds.forEach((childId) => walk(childId, depth + 1));
            }

            if (nodes.some((node) => node.id === rootId)) walk(rootId, 0);
            return { maxDepth: Math.max(1, maxDepth), leafCount: Math.max(1, leafCount) };
        }

        function graphLayoutDimensions(viewportWidth, viewportHeight) {
            const stats = graphStructureStats(graphData.nodes, graphData.edges);
            const levelDistance = 360;
            const leafArcGap = 220;
            const padding = 680;
            const chainReach = stats.maxDepth * levelDistance;
            const breadthReach = (stats.leafCount * leafArcGap) / (Math.PI * 2);
            const radius = Math.min(12000, Math.max(1100, chainReach, breadthReach) + padding);
            const diameter = Math.ceil(radius * 2);

            return {
                width: Math.max(viewportWidth * 3.8, diameter),
                height: Math.max(viewportHeight * 3.35, diameter)
            };
        }

        function layoutGraph(nodes, edges, width, height) {
            const centerX = width / 2;
            const centerY = height / 2;
            const { nodeById, children, rootId } = buildGraphTree(nodes, edges);
            const stats = graphStructureStats(nodes, edges);
            const usableRadius = Math.max(360, Math.min(width, height) / 2 - 360);
            const levelDistance = Math.max(360, usableRadius / stats.maxDepth);
            const leafStep = stats.leafCount > 1 ? (Math.PI * 2) / stats.leafCount : 0;
            const startAngle = stats.leafCount > 1 ? -Math.PI / 2 : 0;
            let leafIndex = 0;

            function angleForIndex(index) {
                return startAngle + index * leafStep;
            }

            function placeNode(nodeId, depth) {
                const node = nodeById.get(nodeId);
                if (!node) return 0;

                const childIds = children.get(nodeId) || [];
                let midIndex;
                if (!childIds.length) {
                    midIndex = leafIndex;
                    leafIndex += 1;
                } else {
                    const childMidpoints = childIds.map((childId) => placeNode(childId, depth + 1));
                    midIndex = childMidpoints.reduce((total, value) => total + value, 0) / childMidpoints.length;
                }

                const angle = angleForIndex(midIndex);
                const radius = depth * levelDistance;
                node.x = centerX + Math.cos(angle) * radius;
                node.y = centerY + Math.sin(angle) * radius;
                node.scale = 1;
                return midIndex;
            }

            placeNode(rootId, 0);
        }

        function nodeScreenScale() {
            return Math.max(0.16, Math.min(18, 1 / graphZoom));
        }

        function graphNodeRadius(node) {
            return node.type === "root" ? 20 : node.type === "folder" ? 16 : 13;
        }

        function graphHitRadius(node) {
            const radius = graphNodeRadius(node);
            const expandedRadius = Math.max(24, radius + 8);
            const compactRadius = radius + 3;
            const overviewProgress = Math.max(0, Math.min(1, (graphZoom - 0.14) / 0.26));
            return compactRadius + (expandedRadius - compactRadius) * overviewProgress;
        }

        function updateGraphNodeScales() {
            if (!graphViewport) return;
            const scale = nodeScreenScale();
            graphViewport.querySelectorAll(".graph-node").forEach((group) => {
                const node = graphData.nodes.find((item) => item.id === group.dataset.nodeId);
                if (!node) return;
                group.setAttribute("transform", `translate(${node.x} ${node.y}) scale(${scale})`);
                const hitTarget = group.querySelector(".graph-hit-target");
                if (hitTarget) hitTarget.setAttribute("r", graphHitRadius(node));
            });
        }

        function createSvgElement(name, attributes = {}) {
            const element = document.createElementNS(svgNamespace, name);
            Object.entries(attributes).forEach(([key, value]) => element.setAttribute(key, value));
            return element;
        }

        function shortLabel(value) {
            const label = String(value || "");
            return label.length > 28 ? `${label.slice(0, 25)}...` : label;
        }

        function renderGraph() {
            const width = Math.max(360, Math.round(graphSvg.clientWidth || graphSvg.parentElement.clientWidth || 720));
            const height = Math.max(460, Math.round(graphSvg.clientHeight || graphSvg.parentElement.clientHeight || 620));
            const { width: layoutWidth, height: layoutHeight } = graphLayoutDimensions(width, height);
            const filter = pageFilter.value.trim().toLowerCase();
            const nodeById = new Map(graphData.nodes.map((node) => [node.id, node]));
            const focusedIds = getFocusedNodeIds();

            graphSvg.replaceChildren();
            graphSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
            graphEmpty.hidden = graphData.nodes.length > 1;

            if (graphData.nodes.length <= 1) return;

            graphLayoutSize = { width: layoutWidth, height: layoutHeight };
            layoutGraph(graphData.nodes, graphData.edges, layoutWidth, layoutHeight);
            if (!graphHasUserTransform) {
                graphZoom = minGraphZoom;
                graphPan = {
                    x: (width - layoutWidth * graphZoom) / 2,
                    y: (height - layoutHeight * graphZoom) / 2
                };
            }

            const viewportLayer = createSvgElement("g", { class: "graph-viewport" });
            graphViewport = viewportLayer;
            applyGraphPan();

            const edgeLayer = createSvgElement("g", { class: "graph-edges" });
            graphData.edges.forEach((edge) => {
                const source = nodeById.get(edge.source);
                const target = nodeById.get(edge.target);
                if (!source || !target) return;

                const sourceMatches = !filter || source.type !== "file" || source.path.toLowerCase().includes(filter);
                const targetMatches = !filter || target.type !== "file" || target.path.toLowerCase().includes(filter);
                const focusMatches = !focusedNodeId || (focusedIds.has(edge.source) && focusedIds.has(edge.target));
                const line = createSvgElement("line", {
                    class: `graph-edge ${edge.type}${sourceMatches && targetMatches && focusMatches ? "" : " dimmed"}`,
                    x1: source.x,
                    y1: source.y,
                    x2: target.x,
                    y2: target.y
                });
                edgeLayer.appendChild(line);
            });
            viewportLayer.appendChild(edgeLayer);

            const nodeLayer = createSvgElement("g", { class: "graph-nodes" });
            graphData.nodes.slice().sort((left, right) => {
                const order = { root: 0, folder: 1, file: 2 };
                return order[left.type] - order[right.type];
            }).forEach((node) => {
                const matches = !filter || node.type !== "file" || node.path.toLowerCase().includes(filter);
                const focusMatches = !focusedNodeId || focusedIds.has(node.id);
                const group = createSvgElement("g", {
                    class: `graph-node ${node.type}${node.id === focusedNodeId ? " focused" : ""}${selectedPath && node.path === selectedPath ? " selected" : ""}${matches && focusMatches ? "" : " dimmed"}`,
                    "data-node-id": node.id,
                    transform: `translate(${node.x} ${node.y}) scale(${nodeScreenScale()})`
                });
                group.style.cursor = "pointer";

                const radius = graphNodeRadius(node);
                group.appendChild(createSvgElement("circle", { r: radius }));

                group.appendChild(createSvgElement("circle", { class: "graph-hit-target", r: graphHitRadius(node) }));

                const title = createSvgElement("title");
                title.textContent = node.path || "Vault";
                group.appendChild(title);

                const text = createSvgElement("text", { x: radius + 6, y: 4 });
                text.textContent = shortLabel(node.label);
                group.appendChild(text);

                if (node.type === "file") {
                    group.addEventListener("click", (event) => {
                        event.stopPropagation();
                        if (graphSuppressClick) return;
                        loadPage(node.path);
                    });
                } else {
                    group.addEventListener("click", (event) => {
                        event.stopPropagation();
                        if (graphSuppressClick) return;
                        focusFolder(node.path);
                    });
                }

                nodeLayer.appendChild(group);
            });
            viewportLayer.appendChild(nodeLayer);
            graphSvg.appendChild(viewportLayer);
        }

        async function loadAllPageContent() {
            const cachedContent = new Map();
            pages.filter(isMarkdownFile).forEach((page) => {
                const cached = readCache(pageCacheKey(page.path), contentCacheTtl);
                if (typeof cached === "string") cachedContent.set(page.path, cached);
            });
            pageContentByPath = cachedContent;
            if (cachedContent.size) {
                buildGraph();
                renderTree();
                renderGraph();
            }

            await mapLimit(pages.filter(isMarkdownFile), 8, async (page) => {
                try {
                    const payload = await api(`/api/second-brain/page?path=${encodeURIComponent(page.path)}`);
                    const content = payload.page.content || "";
                    pageContentByPath.set(page.path, content);
                    writeCache(pageCacheKey(page.path), content);
                } catch (error) {
                    if (!pageContentByPath.has(page.path)) pageContentByPath.set(page.path, "");
                }
            });
        }

        async function refreshPages(options = {}) {
            graphStatus.textContent = "Loading";
            saveStatus.textContent = "";
            if (!options.forceNetwork) {
                const cachedPages = readCache(pagesCacheKey, pagesCacheTtl);
                if (Array.isArray(cachedPages) && cachedPages.length) {
                    pages = cachedPages;
                    pageCount.textContent = `${pages.length} file${pages.length === 1 ? "" : "s"}`;
                    graphStatus.textContent = "Cached";
                    buildGraph();
                    renderTree();
                    renderGraph();
                } else {
                    showTreeSkeleton();
                    showGraphSkeleton();
                }
            } else {
                showTreeSkeleton();
                showGraphSkeleton();
                closePreview();
                focusedNodeId = "";
            }

            try {
                const payload = await api("/api/second-brain/pages");
                pages = payload.pages || [];
                writeCache(pagesCacheKey, pages);
                pageCount.textContent = `${pages.length} file${pages.length === 1 ? "" : "s"}`;
                graphStatus.textContent = "Reading";
                await loadAllPageContent();
                if (options.keepSelection && pages.some((page) => page.path === options.keepSelection)) {
                    await loadPage(options.keepSelection);
                } else if (options.keepFocus && graphData.nodes.some((node) => node.id === options.keepFocus)) {
                    focusedNodeId = options.keepFocus;
                }
                buildGraph();
                renderTree();
                renderGraph();
                graphStatus.textContent = "Ready";
                graphTitle.textContent = pages.length ? "Vault Map" : "Empty Vault";
            } catch (error) {
                graphStatus.textContent = "Blocked";
                vaultTree.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
                graphEmpty.hidden = false;
                graphEmpty.textContent = error.message;
            }
        }

        async function loadPage(path) {
            const fileRecord = fileRecordForPath(path);
            const cached = readCache(pageCacheKey(path), Infinity);
            if ((typeof cached === "string" || (cached && typeof cached === "object")) && !pageContentByPath.has(path)) {
                pageContentByPath.set(path, cached);
            }

            selectedPath = path;
            focusedNodeId = fileNodeId(path);
            const visiblePath = displayVaultPath(path);
            graphStatus.textContent = "Ready";
            saveStatus.textContent = "Loaded";
            pathInput.disabled = false;
            pathInput.value = visiblePath;
            currentPath.textContent = visiblePath;

            if (!pageContentByPath.has(path)) {
                saveStatus.textContent = "Loading";
                showPreviewSkeleton(path);
                const payload = await api(`/api/second-brain/page?path=${encodeURIComponent(path)}`);
                const content = payload.page.type === "image" ? payload.page : payload.page.content || "";
                pageContentByPath.set(path, content);
                writeCache(pageCacheKey(path), content);
            }

            const previewContent = pageContentByPath.get(path);
            if (isImageFile(fileRecord) || previewContent?.type === "image") {
                const image = previewContent?.data_url ? previewContent : { path, data_url: "", content_type: fileRecord.content_type || "" };
                contentPreview.innerHTML = image.data_url
                    ? `<figure class="asset-preview"><img src="${escapeHtml(image.data_url)}" alt="${escapeHtml(visiblePath)}"><figcaption>${escapeHtml(visiblePath)}</figcaption></figure>`
                    : `<p class="empty">Image preview unavailable.</p>`;
            } else {
                contentPreview.innerHTML = renderMarkdown(previewContent || "", path);
            }
            openPreview();
            renderTree();
            renderGraph();
        }

        document.getElementById("closeEditor").addEventListener("click", clearFocusAndPreview);

        document.getElementById("logoutButton").addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login.html";
        });

        const refreshPagesButton = document.getElementById("refreshPages");
        const rebuildGraphButton = document.getElementById("rebuildGraph");
        refreshPagesButton.addEventListener("click", () => runRefreshButton(refreshPagesButton, () => refreshPages({
            forceNetwork: true,
            keepSelection: selectedPath,
            keepFocus: focusedNodeId
        })));
        rebuildGraphButton.addEventListener("click", () => runRefreshButton(rebuildGraphButton, () => {
            buildGraph();
            renderGraph();
            graphStatus.textContent = "Rebuilt";
        }));
        graphSvg.addEventListener("pointerdown", (event) => {
            if (event.button !== 0) return;
            if (event.target.closest(".graph-node")) return;
            graphDrag = {
                pointerId: event.pointerId,
                startX: event.clientX,
                startY: event.clientY,
                originX: graphPan.x,
                originY: graphPan.y,
                moved: false
            };
            graphSvg.setPointerCapture(event.pointerId);
            graphSvg.classList.add("is-ready-to-drag");
        });
        graphSvg.addEventListener("pointermove", (event) => {
            if (!graphDrag || graphDrag.pointerId !== event.pointerId) return;
            const dx = event.clientX - graphDrag.startX;
            const dy = event.clientY - graphDrag.startY;
            if (Math.abs(dx) + Math.abs(dy) > 3) {
                graphDrag.moved = true;
                graphSvg.classList.add("is-dragging");
            }
            if (!graphDrag.moved) return;
            graphPan = {
                x: graphDrag.originX + dx,
                y: graphDrag.originY + dy
            };
            graphHasUserTransform = true;
            applyGraphPan();
        });
        graphSvg.addEventListener("pointerup", (event) => {
            if (!graphDrag || graphDrag.pointerId !== event.pointerId) return;
            const wasMoved = graphDrag.moved;
            graphDrag = null;
            graphSvg.classList.remove("is-ready-to-drag", "is-dragging");
            if (graphSvg.hasPointerCapture(event.pointerId)) graphSvg.releasePointerCapture(event.pointerId);
            if (wasMoved) {
                graphSuppressClick = true;
                window.setTimeout(() => {
                    graphSuppressClick = false;
                }, 0);
            }
        });
        graphSvg.addEventListener("pointercancel", (event) => {
            graphDrag = null;
            graphSvg.classList.remove("is-ready-to-drag", "is-dragging");
            if (graphSvg.hasPointerCapture(event.pointerId)) graphSvg.releasePointerCapture(event.pointerId);
        });
        graphSvg.addEventListener("click", (event) => {
            if (graphSuppressClick) {
                event.preventDefault();
                return;
            }
            if (event.target.closest(".graph-node")) return;
            clearFocusAndPreview();
        });
        graphSvg.addEventListener("wheel", (event) => {
            event.preventDefault();
            const rect = graphSvg.getBoundingClientRect();
            const zoomFactor = event.deltaY < 0 ? 1.22 : 0.74;
            setGraphZoom(graphZoom * zoomFactor, event.clientX - rect.left, event.clientY - rect.top);
        }, { passive: false });
        zoomOutGraph.addEventListener("click", () => setGraphZoom(graphZoom * 0.68));
        zoomInGraph.addEventListener("click", () => setGraphZoom(graphZoom * 1.42));
        collapseTree.addEventListener("click", () => setVaultTreeOpen(false));
        openTree.addEventListener("click", () => setVaultTreeOpen(true));
        vaultTree.addEventListener("click", (event) => {
            if (event.target.closest(".tree-folder summary, .tree-file")) return;
            clearFocusAndPreview();
        });
        contentPreview.addEventListener("click", (event) => {
            const link = event.target.closest("a[data-wiki-path]");
            if (!link) return;
            event.preventDefault();
            loadPage(link.dataset.wikiPath);
        });
        searchToggle.addEventListener("click", () => setSearchOpen(!vaultSearch.classList.contains("is-open")));
        pageFilter.addEventListener("input", () => {
            syncSearchState();
            renderTree();
            renderGraph();
        });
        pageFilter.addEventListener("keydown", (event) => {
            if (event.key !== "Escape") return;
            if (pageFilter.value) {
                pageFilter.value = "";
                syncSearchState();
                renderTree();
                renderGraph();
            }
            setSearchOpen(false);
            searchToggle.focus();
        });
        pageFilter.addEventListener("blur", () => {
            if (!pageFilter.value.trim()) setSearchOpen(false);
        });
        let resizeTimer = 0;
        window.addEventListener("resize", () => {
            window.clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(renderGraph, 120);
        });

        refreshPages();
    </script>
</body>
</html>
