<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Synthesis Intake</title>
    <link rel="stylesheet" href="/dashboard.css?v=20260526-refresh">
    <link rel="stylesheet" href="/youtube-synthesis.css?v=20260526-cache">
</head>
<body>
    <header class="topbar">
        <div>
            <p class="eyebrow">cartdotcom control surface</p>
            <h1>YouTube Synthesis Intake</h1>
        </div>
        <nav class="topnav" aria-label="Main navigation">
            <a href="/home.html">Home</a>
            <a href="/backend/dashboard.html">Dashboard</a>
            <a href="/backend/prompting.html">Prompting</a>
            <a href="/backend/second-brain.html">Second Brain</a>
            <a href="/mobile-approval.html">Mobile Approval</a>
            <button class="nav-button" id="logoutButton" type="button">Logout</button>
        </nav>
    </header>

    <main class="shell youtube-shell">
        <section class="composer-panel youtube-panel" aria-label="YouTube synthesis intake">
            <form id="youtubeForm" class="youtube-form">
                <label class="composer-label" for="youtubeUrl">YouTube URL</label>
                <div class="youtube-url-row">
                    <input id="youtubeUrl" class="youtube-url-input" type="url" inputmode="url" autocomplete="off" placeholder="https://www.youtube.com/watch?v=..." required>
                    <button id="submitYoutube" class="icon-button youtube-submit" type="submit" aria-label="Queue YouTube synthesis" title="Queue YouTube synthesis">
                        <svg aria-hidden="true" viewBox="0 0 24 24">
                            <path d="M22 2 11 13"></path>
                            <path d="m22 2-7 20-4-9-9-4Z"></path>
                        </svg>
                    </button>
                </div>
                <p id="submitStatus" class="copy-status" aria-live="polite"></p>
            </form>

            <div class="youtube-jobs-head">
                <h2>Recent Jobs</h2>
                <button class="icon-button refresh-button" id="refreshJobs" type="button" aria-label="Refresh jobs" title="Refresh jobs">
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                        <path d="M21 12a9 9 0 0 1-15.4 6.4L3 16"></path>
                        <path d="M3 21v-5h5"></path>
                        <path d="M3 12a9 9 0 0 1 15.4-6.4L21 8"></path>
                        <path d="M21 3v5h-5"></path>
                    </svg>
                </button>
            </div>
            <div id="jobList" class="youtube-job-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="/refresh-button.js?v=20260526-refresh"></script>
    <script>
        const form = document.getElementById("youtubeForm");
        const youtubeUrl = document.getElementById("youtubeUrl");
        const submitButton = document.getElementById("submitYoutube");
        const submitStatus = document.getElementById("submitStatus");
        const jobList = document.getElementById("jobList");
        const refreshJobs = document.getElementById("refreshJobs");
        const cacheKey = "cartdotcom:youtube-synthesis:recent-jobs";
        const cacheTtlMs = 5 * 60 * 1000;

        function readJobsCache() {
            try {
                const cached = JSON.parse(localStorage.getItem(cacheKey) || "null");
                if (!cached || !cached.savedAt || Date.now() - cached.savedAt > cacheTtlMs) return null;
                return Array.isArray(cached.jobs) ? cached.jobs : null;
            } catch (error) {
                return null;
            }
        }

        function writeJobsCache(jobs) {
            try {
                localStorage.setItem(cacheKey, JSON.stringify({ savedAt: Date.now(), jobs }));
            } catch (error) {
                // Cache failures should not block the recent-jobs UI.
            }
        }

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function formatDate(value) {
            if (!value) return "";
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? value : date.toLocaleString();
        }

        function renderJobSkeletons() {
            jobList.innerHTML = Array.from({ length: 4 }, () => `
                <article class="youtube-job youtube-job-skeleton" aria-hidden="true">
                    <div>
                        <strong class="youtube-skeleton skeleton-job-id">&nbsp;</strong>
                        <span class="youtube-skeleton skeleton-job-status">&nbsp;</span>
                    </div>
                    <span class="youtube-skeleton skeleton-job-url">&nbsp;</span>
                    <small class="youtube-skeleton skeleton-job-note">&nbsp;</small>
                </article>
            `).join("");
        }

        async function api(path, options = {}) {
            const response = await fetch(path, {
                credentials: "same-origin",
                ...options,
                headers: {
                    accept: "application/json",
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });
            const contentType = response.headers.get("content-type") || "";
            const payload = contentType.includes("application/json") ? await response.json().catch(() => ({})) : {};
            if (!contentType.includes("application/json")) {
                throw new Error("Backend login required");
            }
            if (!response.ok || payload.error) {
                throw new Error(payload.error || "Request failed");
            }
            return payload;
        }

        function renderJobs(jobs) {
            if (!jobs.length) {
                jobList.innerHTML = "<p class='empty'>No YouTube synthesis jobs yet.</p>";
                return;
            }

            jobList.innerHTML = jobs.map((job) => `
                <article class="youtube-job">
                    <div>
                        <strong>${escapeHtml(job.jobId)}</strong>
                        <span>${escapeHtml(job.status || "queued")}</span>
                    </div>
                    <a href="${escapeHtml(job.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(job.videoId || job.url)}</a>
                    <small>${escapeHtml(formatDate(job.createdAt))}${job.retryOf ? " - retry of " + escapeHtml(job.retryOf) : ""}${job.note ? " - " + escapeHtml(job.note) : ""}</small>
                    ${job.canRetry ? `<button class="icon-button youtube-retry" type="button" data-job-id="${escapeHtml(job.jobId)}" aria-label="Retry job ${escapeHtml(job.jobId)}" title="Retry job ${escapeHtml(job.jobId)}">
                        <svg aria-hidden="true" viewBox="0 0 24 24">
                            <path d="M21 12a9 9 0 0 1-15.4 6.4L3 16"></path>
                            <path d="M3 21v-5h5"></path>
                            <path d="M3 12a9 9 0 0 1 15.4-6.4L21 8"></path>
                            <path d="M21 3v5h-5"></path>
                        </svg>
                    </button>` : ""}
                </article>
            `).join("");
        }

        async function loadJobs() {
            const cached = readJobsCache();
            if (cached) {
                renderJobs(cached);
            } else {
                renderJobSkeletons();
            }
            try {
                const payload = await api("/api/backend/youtube-synthesis");
                const jobs = payload.jobs || [];
                writeJobsCache(jobs);
                renderJobs(jobs);
            } catch (error) {
                if (!cached) jobList.innerHTML = `<p class="empty">${escapeHtml(error.message)}</p>`;
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const url = youtubeUrl.value.trim();
            if (!url) {
                submitStatus.textContent = "URL required";
                return;
            }

            submitButton.disabled = true;
            submitStatus.textContent = "Queueing";
            try {
                const payload = await api("/api/backend/youtube-synthesis", {
                    method: "POST",
                    body: JSON.stringify({ url })
                });
                submitStatus.textContent = payload.duplicate ? (payload.message || `Already queued ${payload.jobId}`) : `Queued ${payload.jobId}`;
                youtubeUrl.value = "";
                await loadJobs();
            } catch (error) {
                submitStatus.textContent = error.message;
            } finally {
                submitButton.disabled = false;
            }
        });

        refreshJobs.addEventListener("click", () => runRefreshButton(refreshJobs, loadJobs));
        jobList.addEventListener("click", async (event) => {
            const button = event.target.closest(".youtube-retry");
            if (!button) return;

            button.disabled = true;
            submitStatus.textContent = `Retrying ${button.dataset.jobId}`;
            try {
                const payload = await api("/api/backend/youtube-synthesis", {
                    method: "POST",
                    body: JSON.stringify({ retryJobId: button.dataset.jobId })
                });
                submitStatus.textContent = payload.duplicate ? (payload.message || `Already queued ${payload.jobId}`) : `Queued retry ${payload.jobId}`;
                await loadJobs();
            } catch (error) {
                submitStatus.textContent = error.message;
                button.disabled = false;
            }
        });
        document.getElementById("logoutButton").addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login.html";
        });

        loadJobs();
    </script>
</body>
</html>
