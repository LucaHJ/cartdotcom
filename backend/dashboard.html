<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Small Notes</title>
    <link rel="stylesheet" href="/dashboard.css?v=20260526-refresh">
    <link rel="stylesheet" href="/dashboard-small-notes.css?v=20260526-shorts">
    <link rel="stylesheet" href="/shorts-analytics.css?v=20260527-detail">
</head>
<body class="small-notes-dashboard">
    <header class="topbar notes-topbar">
        <nav class="topnav" aria-label="Main navigation">
            <a href="/home.html">Home</a>
            <a href="/backend/prompting.html">Prompting</a>
            <a href="/backend/second-brain.html">Second Brain</a>
            <a href="/backend/youtube-synthesis.html">YouTube</a>
            <a href="/backend/instagram.html">Instagram</a>
            <a href="/backend/shorts-analytics.html">Shorts</a>
            <a href="/mobile-approval.html">Mobile Approval</a>
            <button class="icon-button refresh-button" id="refreshNotes" type="button" aria-label="Refresh notes" title="Refresh notes">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M21 12a9 9 0 0 1-15.4 6.4L3 16"></path>
                    <path d="M3 21v-5h5"></path>
                    <path d="M3 12a9 9 0 0 1 15.4-6.4L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                </svg>
            </button>
            <button class="nav-button" id="logoutButton" type="button">Logout</button>
        </nav>
    </header>

    <main class="notes-shell" aria-labelledby="notesTitle">
        <section class="notes-stage">
            <p class="eyebrow">second brain</p>
            <h1 id="notesTitle">Small Notes</h1>
            <p id="notesStatus" class="notes-status" aria-live="polite">Loading</p>
            <section id="shortsPerformance" class="shorts-performance-widget" aria-label="Shorts performance" aria-live="polite"></section>
            <div id="synthesisStatus" class="synthesis-status-board" aria-label="Reel and YouTube synthesis status counts" aria-live="polite"></div>
            <ul id="smallNotes" class="small-notes-list" aria-live="polite"></ul>
        </section>
    </main>

    <script src="/refresh-button.js?v=20260526-refresh"></script>
    <script src="/shorts-analytics.js?v=20260527-detail"></script>
    <script>
        const notesStatus = document.getElementById("notesStatus");
        const smallNotes = document.getElementById("smallNotes");
        const refreshNotes = document.getElementById("refreshNotes");
        const synthesisStatus = document.getElementById("synthesisStatus");
        const shortsPerformance = document.getElementById("shortsPerformance");
        const cachePrefix = "cartdotcom:dashboard:20260526-reel-status:";
        const cacheTtlMs = 5 * 60 * 1000;
        const synthesisCacheTtlMs = 60 * 1000;

        function readCache(key, ttlMs = cacheTtlMs) {
            try {
                const cached = JSON.parse(localStorage.getItem(cachePrefix + key) || "null");
                if (!cached || !cached.savedAt || Date.now() - cached.savedAt > ttlMs) return null;
                return cached.value;
            } catch (error) {
                return null;
            }
        }

        function writeCache(key, value) {
            try {
                localStorage.setItem(cachePrefix + key, JSON.stringify({ savedAt: Date.now(), value }));
            } catch (error) {
                // Cache failures should not block dashboard rendering.
            }
        }

        function clearCache(key) {
            try {
                localStorage.removeItem(cachePrefix + key);
            } catch (error) {
                // Cache cleanup failures should not block dashboard rendering.
            }
        }

        function stripMarkdown(value) {
            return String(value || "")
                .replace(/\[\[[^\]|]+\|([^\]]+)\]\]/g, "$1")
                .replace(/\[\[([^\]]+)\]\]/g, "$1")
                .replace(/\*\*([^*]+)\*\*/g, "$1")
                .replace(/\*([^*]+)\*/g, "$1")
                .replace(/`([^`]+)`/g, "$1")
                .trim();
        }

        function parseSmallNotes(markdown) {
            const notes = [];
            let inNotes = false;

            for (const line of String(markdown || "").split(/\r?\n/)) {
                const trimmed = line.trim();
                if (/^##\s+Notes\s*$/i.test(trimmed)) {
                    inNotes = true;
                    continue;
                }
                if (inNotes && /^##\s+/.test(trimmed)) break;
                if (!inNotes) continue;

                const match = line.match(/^(\s*)-\s+(.+?)\s*$/);
                if (!match) continue;

                const indent = match[1].replace(/\t/g, "    ").length;
                notes.push({
                    level: Math.min(2, Math.floor(indent / 2)),
                    text: stripMarkdown(match[2])
                });
            }

            return notes.filter(note => note.text);
        }

        function renderSynthesisSkeleton() {
            synthesisStatus.innerHTML = "";
            const fragment = document.createDocumentFragment();
            for (const groupLabel of ["Instagram reels", "YouTube videos"]) {
                const section = document.createElement("section");
                section.className = "synthesis-status-group skeleton-group";

                const header = document.createElement("div");
                header.className = "synthesis-status-header";
                header.innerHTML = `<span>${groupLabel}</span><strong class="skeleton-number">&nbsp;</strong>`;
                section.appendChild(header);

                const list = document.createElement("ul");
                list.className = "synthesis-stage-list";
                for (let index = 0; index < 5; index += 1) {
                    const item = document.createElement("li");
                    item.innerHTML = `<span class="skeleton-line">&nbsp;</span><strong class="skeleton-count">&nbsp;</strong>`;
                    list.appendChild(item);
                }
                section.appendChild(list);
                fragment.appendChild(section);
            }
            synthesisStatus.appendChild(fragment);
        }

        function renderSynthesisStatus(payload) {
            synthesisStatus.innerHTML = "";
            const groups = Array.isArray(payload?.groups) ? payload.groups : [];
            if (!groups.length) {
                synthesisStatus.textContent = "Synthesis counts unavailable";
                return;
            }

            const fragment = document.createDocumentFragment();
            for (const group of groups) {
                const section = document.createElement("section");
                section.className = "synthesis-status-group";

                const header = document.createElement("div");
                header.className = "synthesis-status-header";

                const label = document.createElement("span");
                label.textContent = group.label || "Synthesis";

                const total = document.createElement("strong");
                total.textContent = String(group.total ?? 0);
                total.setAttribute("aria-label", `${group.total ?? 0} total`);

                header.append(label, total);
                section.appendChild(header);

                const list = document.createElement("ul");
                list.className = "synthesis-stage-list";

                for (const stage of group.stages || []) {
                    const item = document.createElement("li");
                    const stageLabel = document.createElement("span");
                    stageLabel.textContent = stage.label || stage.id || "Status";
                    const count = document.createElement("strong");
                    count.textContent = String(stage.count ?? 0);
                    item.append(stageLabel, count);
                    list.appendChild(item);
                }

                section.appendChild(list);
                fragment.appendChild(section);
            }

            synthesisStatus.appendChild(fragment);
        }

        function renderNotesSkeleton() {
            smallNotes.innerHTML = "";
            const fragment = document.createDocumentFragment();
            for (let index = 0; index < 4; index += 1) {
                const item = document.createElement("li");
                item.className = "note-line skeleton-note";
                item.innerHTML = "&nbsp;";
                fragment.appendChild(item);
            }
            smallNotes.appendChild(fragment);
        }

        function renderNotes(notes) {
            smallNotes.innerHTML = "";
            if (!notes.length) {
                notesStatus.textContent = "No small notes found";
                return;
            }

            const fragment = document.createDocumentFragment();
            for (const note of notes) {
                const item = document.createElement("li");
                item.className = "note-line level-" + note.level;
                item.textContent = note.text;
                fragment.appendChild(item);
            }

            smallNotes.appendChild(fragment);
            notesStatus.textContent = notes.length === 1 ? "1 note" : notes.length + " notes";
        }

        async function api(path) {
            const response = await fetch(path, {
                credentials: "same-origin",
                headers: { accept: "application/json" }
            });
            const contentType = response.headers.get("content-type") || "";
            const text = await response.text();

            if (!contentType.includes("application/json")) {
                throw new Error("Backend login required");
            }

            let payload;
            try {
                payload = JSON.parse(text);
            } catch (error) {
                throw new Error("Dashboard response was not valid JSON");
            }

            if (!response.ok || payload.error) {
                throw new Error(payload.error || "Small notes could not be loaded");
            }

            return payload;
        }

        async function loadSynthesisStatus(options = {}) {
            const cached = options.forceNetwork ? null : readCache("synthesis-status", synthesisCacheTtlMs);
            if (cached) {
                renderSynthesisStatus(cached);
            } else {
                renderSynthesisSkeleton();
            }
            try {
                if (options.forceNetwork) clearCache("synthesis-status");
                const payload = await api("/api/backend/synthesis-status");
                writeCache("synthesis-status", payload);
                renderSynthesisStatus(payload);
            } catch (error) {
                if (!cached) synthesisStatus.textContent = error.message || "Synthesis counts unavailable";
            }
        }

        async function loadSmallNotes(options = {}) {
            const cached = options.forceNetwork ? null : readCache("small-notes");
            if (cached) {
                notesStatus.textContent = cached.length === 1 ? "1 note" : cached.length + " notes";
                renderNotes(cached);
            } else {
                notesStatus.textContent = "Loading";
                renderNotesSkeleton();
            }

            try {
                if (options.forceNetwork) clearCache("small-notes");
                const payload = await api("/api/second-brain/page?path=wiki%2Fsmall-notes.md");
                const notes = parseSmallNotes(payload.page?.content || "");
                writeCache("small-notes", notes);
                renderNotes(notes);
            } catch (error) {
                if (!cached) notesStatus.textContent = error.message || "Small notes unavailable";
            }
        }

        async function loadDashboard(options = {}) {
            await Promise.allSettled([
                loadSmallNotes(options),
                loadSynthesisStatus(options),
                loadShortsPerformanceWidget(shortsPerformance, { link: true })
            ]);
        }

        refreshNotes.addEventListener("click", () => runRefreshButton(refreshNotes, () => loadDashboard({ forceNetwork: true })));

        document.getElementById("logoutButton").addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login.html";
        });

        loadDashboard();
    </script>
</body>
</html>
