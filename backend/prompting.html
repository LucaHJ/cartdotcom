<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Prompting Surface</title>
    <link rel="stylesheet" href="/dashboard.css?v=20260525-youtube">
</head>
<body>
    <header class="topbar">
        <div>
            <p class="eyebrow">cartdotcom control surface</p>
            <h1>Codex Prompting Surface</h1>
        </div>
        <nav class="topnav" aria-label="Main navigation">
            <a href="/home.html">Home</a>
            <a href="/backend/dashboard.html">Dashboard</a>
            <a href="/backend/second-brain.html">Second Brain</a>
            <a href="/backend/youtube-synthesis.html">YouTube</a>
            <a href="/mobile-approval.html">Mobile Approval</a>
            <button class="nav-button" id="logoutButton" type="button">Logout</button>
            <a href="https://github.com/LucaHJ/cartdotcom">GitHub</a>
        </nav>
    </header>

    <main class="shell prompt-shell">
        <section class="composer-panel" aria-label="Remote Codex prompt composer">
            <div class="composer-status">
                <span>Authenticated delivery</span>
                <span>Approval queue</span>
                <span>Fixed queue policy</span>
            </div>

            <form id="promptForm" class="composer-form">
                <label class="composer-label" for="promptInput">Prompt</label>
                <textarea id="promptInput" class="composer-input" rows="10" placeholder="Message Codex..."></textarea>

                <div id="attachmentList" class="attachment-list" aria-live="polite"></div>

                <div class="composer-actions">
                    <label class="upload-button" for="fileInput">
                        Upload
                        <input id="fileInput" type="file" multiple>
                    </label>
                    <button id="submitPrompt" type="submit">Send</button>
                    <span id="submitStatus" class="copy-status" aria-live="polite"></span>
                </div>
            </form>

            <details class="settings-menu">
                <summary>Settings</summary>
                <div class="settings-content">
                    <div class="panel-head compact-head">
                        <div>
                            <p class="eyebrow">local only</p>
                            <h2>Prompt History</h2>
                        </div>
                        <button class="text-button" id="clearHistory" type="button">Clear</button>
                    </div>
                    <div id="promptHistory" class="history-list"></div>
                </div>
            </details>
        </section>
    </main>

    <script>
        const storageKey = "cartdotcom.promptHistory";
        const maxFileBytes = 128 * 1024;
        const maxFiles = 5;
        let attachments = [];

        const promptInput = document.getElementById("promptInput");
        const fileInput = document.getElementById("fileInput");
        const attachmentList = document.getElementById("attachmentList");
        const submitStatus = document.getElementById("submitStatus");
        const submitButton = document.getElementById("submitPrompt");
        const promptHistory = document.getElementById("promptHistory");

        function loadHistory() {
            try {
                return JSON.parse(localStorage.getItem(storageKey) || "[]");
            } catch (error) {
                return [];
            }
        }

        function saveHistory(history) {
            localStorage.setItem(storageKey, JSON.stringify(history.slice(-12)));
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function isTextLike(file) {
            return file.type.startsWith("text/")
                || /\.(md|txt|json|csv|tsv|yaml|yml|xml|html|css|js|ts|py|ps1|cs)$/i.test(file.name);
        }

        async function readAttachment(file) {
            const attachment = {
                name: file.name,
                type: file.type || "application/octet-stream",
                size: file.size,
                encoding: "metadata-only",
                content: "",
                truncated: file.size > maxFileBytes
            };

            if (isTextLike(file)) {
                const blob = attachment.truncated ? file.slice(0, maxFileBytes) : file;
                attachment.encoding = "utf-8";
                attachment.content = await blob.text();
            }

            return attachment;
        }

        function renderAttachments() {
            attachmentList.innerHTML = "";
            if (!attachments.length) return;

            attachments.forEach((attachment, index) => {
                const chip = document.createElement("div");
                chip.className = "attachment-chip";
                chip.innerHTML = `
                    <span>
                        <strong>${escapeHtml(attachment.name)}</strong>
                        <small>${Math.ceil(attachment.size / 1024)} KB - ${escapeHtml(attachment.encoding)}${attachment.truncated ? " - truncated" : ""}</small>
                    </span>
                    <button type="button" aria-label="Remove attachment">x</button>
                `;
                chip.querySelector("button").addEventListener("click", () => {
                    attachments.splice(index, 1);
                    renderAttachments();
                });
                attachmentList.appendChild(chip);
            });
        }

        function renderHistory() {
            const history = loadHistory();
            promptHistory.innerHTML = "";
            if (!history.length) {
                promptHistory.innerHTML = "<p class='empty'>No submitted prompts yet.</p>";
                return;
            }

            history.slice().reverse().forEach((item) => {
                const promptText = item.prompt || item.objective || "";
                const title = item.title || (item.issueNumber ? `Issue #${item.issueNumber}` : "Submitted prompt");
                const date = item.date || item.createdAt || item.submitted_at || "";
                const preview = item.preview || promptText.replace(/\s+/g, " ").slice(0, 140) || "Upload-only prompt";
                const card = document.createElement("button");
                card.className = "history-card";
                card.type = "button";
                card.innerHTML = `
                    <strong>${escapeHtml(title)}</strong>
                    <small>${escapeHtml(date)}</small>
                    <span>${escapeHtml(preview)}</span>
                `;
                card.addEventListener("click", () => {
                    promptInput.value = promptText;
                    promptInput.focus();
                });
                promptHistory.appendChild(card);
            });
        }

        function addHistory(prompt, payload) {
            const history = loadHistory();
            history.push({
                title: payload.issueNumber ? `Issue #${payload.issueNumber}` : `Queued ${payload.jobId || "prompt"}`,
                date: new Date().toLocaleString(),
                prompt,
                preview: prompt.replace(/\s+/g, " ").slice(0, 140) || "Upload-only prompt"
            });
            saveHistory(history);
            renderHistory();
        }

        function applyQueryPrompt() {
            const params = new URLSearchParams(window.location.search);
            const queryPrompt = params.get("prompt");
            if (queryPrompt) promptInput.value = queryPrompt;
        }

        fileInput.addEventListener("change", async () => {
            const files = Array.from(fileInput.files || []).slice(0, Math.max(0, maxFiles - attachments.length));
            if (!files.length) return;

            submitStatus.textContent = "Reading files";
            for (const file of files) {
                attachments.push(await readAttachment(file));
            }
            fileInput.value = "";
            renderAttachments();
            submitStatus.textContent = "";
        });

        document.getElementById("promptForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            const prompt = promptInput.value.trim();
            if (!prompt && !attachments.length) {
                submitStatus.textContent = "Prompt or upload required";
                return;
            }

            submitButton.disabled = true;
            submitStatus.textContent = "Sending";

            try {
                const response = await fetch("/api/backend/commands", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Command-Client": "cartdotcom-composer"
                    },
                    body: JSON.stringify({ prompt, attachments })
                });
                const contentType = response.headers.get("content-type") || "";
                const redirectedToAccess = response.redirected && response.url.includes("cloudflareaccess.com");
                const payload = contentType.includes("application/json") ? await response.json().catch(() => ({})) : {};
                if (redirectedToAccess || (!contentType.includes("application/json") && response.url.includes("cloudflareaccess.com"))) {
                    throw new Error("Backend login session missing. Sign in again, then try again.");
                }
                if (!response.ok) {
                    throw new Error(payload.error || "Authenticated queue rejected the prompt.");
                }

                addHistory(prompt, payload);
                attachments = [];
                renderAttachments();

                submitStatus.replaceChildren(document.createTextNode("Queued"));
                const nextUrl = payload.approvalRequired && payload.approvalUrl ? payload.approvalUrl : payload.issueUrl;
                if (nextUrl) {
                    submitStatus.appendChild(document.createTextNode("; "));
                    const link = document.createElement("a");
                    link.href = nextUrl;
                    link.textContent = payload.approvalRequired ? "approval required" : `issue #${payload.issueNumber}`;
                    submitStatus.appendChild(link);
                }
            } catch (error) {
                submitStatus.textContent = error.message;
            } finally {
                submitButton.disabled = false;
            }
        });

        document.getElementById("clearHistory").addEventListener("click", () => {
            saveHistory([]);
            renderHistory();
        });
        document.getElementById("logoutButton").addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST" });
            window.location.href = "/login.html";
        });

        applyQueryPrompt();
        renderHistory();
    </script>
</body>
</html>
