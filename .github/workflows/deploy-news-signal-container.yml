name: Deploy News Signal Container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-news-signal-container.yml"
      - "deployment/cloudflare-news-signal-container/**"

concurrency:
  group: deploy-news-signal-container
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker and Container
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    defaults:
      run:
        working-directory: deployment/cloudflare-news-signal-container

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: deployment/cloudflare-news-signal-container/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Confirm Docker is available
        run: docker version

      - name: Deploy Worker and Container
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
